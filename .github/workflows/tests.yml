name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # WeasyPrint (export PDF) a besoin de Pango même si les tests ne génèrent pas de PDF
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpango-1.0-0 libpangoft2-1.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --settings=core.settings_test

      - name: Run tests
        run: python manage.py test --settings=core.settings_test --verbosity=2
