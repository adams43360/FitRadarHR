{# Partial : libellé d'une dimension OCEAN avec infobulle au survol.
   Variables attendues : label (str), tooltip (str) #}
<span
  data-tooltip="{{ tooltip }}"
  @mouseenter="$dispatch('show-ocean-tip', { text: $el.dataset.tooltip, top: $el.getBoundingClientRect().bottom + 8, left: $el.getBoundingClientRect().left })"
  @mouseleave="$dispatch('hide-ocean-tip')"
  class="inline-flex items-center gap-1 cursor-help group">
  <span class="border-b border-dotted border-gray-400 group-hover:border-indigo-400 group-hover:text-indigo-700 transition-colors">{{ label }}</span>
  <svg class="w-3 h-3 text-gray-400 group-hover:text-indigo-400 flex-shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
</span>
