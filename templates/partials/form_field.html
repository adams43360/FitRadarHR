{% load i18n %}
<div class="mb-4">
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
    {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
  </label>
  {% if field.errors %}
    <input id="{{ field.id_for_label }}" name="{{ field.html_name }}"
      type="{{ field.field.widget.input_type }}" value="{{ field.value|default:'' }}"
      class="w-full px-3 py-2 border border-red-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 text-sm">
    <p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>
  {% else %}
    <input id="{{ field.id_for_label }}" name="{{ field.html_name }}"
      type="{{ field.field.widget.input_type }}" value="{{ field.value|default:'' }}"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
  {% endif %}
</div>
