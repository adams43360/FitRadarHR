{% load i18n %}
<nav class="bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <a href="/" class="text-xl font-bold text-indigo-600">FitRadarHR</a>

      {% if user.is_authenticated %}
      <div class="flex items-center gap-6">
        {% if user.is_rh %}
        <a href="{% url 'positions:list' %}" class="text-sm text-gray-600 hover:text-indigo-600">{% trans "Postes" %}</a>
        {% endif %}
        <a href="{% url 'teams:list' %}" class="text-sm text-gray-600 hover:text-indigo-600">{% trans "Équipes" %}</a>
        <a href="{% url 'reports:list' %}" class="text-sm text-gray-600 hover:text-indigo-600">{% trans "Rapports" %}</a>

        <!-- Sélecteur de langue -->
        <form action="{% url 'set_language' %}" method="post" class="flex items-center gap-1">
          {% csrf_token %}
          <input name="next" type="hidden" value="{{ request.get_full_path }}">
          <select name="language" onchange="this.form.submit()"
            class="text-sm border-0 bg-transparent text-gray-500 cursor-pointer">
            <option value="fr" {% if LANGUAGE_CODE == 'fr' %}selected{% endif %}>🇫🇷 FR</option>
            <option value="en" {% if LANGUAGE_CODE == 'en' %}selected{% endif %}>🇬🇧 EN</option>
          </select>
        </form>

        <a href="{% url 'account_logout' %}"
          class="text-sm text-gray-500 hover:text-red-600">{% trans "Déconnexion" %}</a>
      </div>
      {% endif %}
    </div>
  </div>
</nav>
