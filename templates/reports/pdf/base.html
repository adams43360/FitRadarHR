<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 2cm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1f2937; line-height: 1.5; }
  .header { border-bottom: 2px solid #6366f1; padding-bottom: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .header-brand { font-size: 18pt; font-weight: bold; color: #6366f1; }
  .header-meta { font-size: 9pt; color: #6b7280; text-align: right; }
  h1 { font-size: 14pt; font-weight: bold; margin-bottom: 4px; }
  h2 { font-size: 11pt; font-weight: bold; margin: 16px 0 8px 0; color: #4b5563; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; }
  .subtitle { font-size: 10pt; color: #6b7280; margin-bottom: 16px; }
  .warning { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 8px 12px; font-size: 9.5pt; color: #92400e; margin-bottom: 16px; border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th { background: #f9fafb; font-size: 9pt; font-weight: 600; text-align: left; padding: 6px 8px; border-bottom: 2px solid #e5e7eb; color: #374151; }
  td { padding: 7px 8px; border-bottom: 1px solid #f3f4f6; font-size: 10pt; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 9pt; font-weight: 600; }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-amber { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .score-bar-wrap { background: #e5e7eb; border-radius: 99px; height: 8px; margin-top: 4px; }
  .score-bar { height: 8px; border-radius: 99px; background: #6366f1; }
  .overall-box { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
  .overall-score { font-size: 28pt; font-weight: bold; color: #6366f1; min-width: 70px; }
  .overall-label { font-size: 9pt; color: #6b7280; }
  .footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #e5e7eb; font-size: 8pt; color: #9ca3af; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="header">
  <div class="header-brand">FitRadarHR</div>
  <div class="header-meta">
    {% block header_meta %}{% endblock %}
  </div>
</div>
{% block content %}{% endblock %}
<div class="footer">
  <span>FitRadarHR — outil open source basé sur le modèle Big Five / OCEAN (IPIP, domaine public)</span>
  <span>{% now "d/m/Y" %}</span>
</div>
</body>
</html>
