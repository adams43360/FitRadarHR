# nginx interne FitRadarHR — statiques + proxy gunicorn.
# La terminaison HTTPS est faite en amont par Caddy (/srv/proxy) : on transmet
# tel quel le X-Forwarded-Proto reçu de Caddy (ne PAS utiliser $scheme ici,
# sinon Django verrait « http » et SECURE_SSL_REDIRECT bouclerait).

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
