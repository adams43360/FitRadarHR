services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-teamfit}
      POSTGRES_USER: ${DB_USER:-teamfit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teamfit}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-teamfit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # Reset quotidien de l'org de démonstration — actif uniquement avec :
  #   docker compose -f docker/docker-compose.yml --profile demo up -d
  # Requiert DEMO_MODE=True dans .env (sinon seed_demo refuse de s'exécuter).
  demo-reset:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    profiles: ["demo"]
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: >
      sh -c "while true; do python manage.py seed_demo; sleep 86400; done"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - certbot_data:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  postgres_data:
  media_data:
  certbot_data:
